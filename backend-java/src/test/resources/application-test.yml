spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jackson:
    property-naming-strategy: SNAKE_CASE
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
app:
  jwt-secret: test-secret-key-for-jwt-testing-purposes-only
  notification:
    site-message-enable: false
    nanobot-enable: false
    async: false
